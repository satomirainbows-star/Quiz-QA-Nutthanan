name: QA Nutthanan Automation Tests

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Dependencies
        run: npm ci

      - name: Run UI Tests
        run: npm run test:ui

      - name: Generate UI Report
        if: always()
        run: npm run report

      - name: Upload UI Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: reports/

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Start API Server
        run: |
          docker run -d --rm \
          --name qa-practice-api \
          -p 8887:8081 \
          rvancea/qa-practice-api:latest

      - name: Wait for API Server
        run: |
          echo "Waiting for API..."
          sleep 15

      - name: Run API Tests
        run: npm run test:api

      - name: Generate API Report
        if: always()
        run: npm run report

      - name: Upload API Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/

      - name: Stop API Server
        if: always()
        run: docker stop qa-practice-api